<!DOCTYPE html>
<html>

<head>
<title>Free Background Remover</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Free Background Remover for Passport and Any Other Purposes</h1>

<div class="container">

<input type="file" id="upload" accept="image/*">

<br><br>

<label>Select Background Colour / Purpose</label>

<select id="bgColor">
<option value="white">Passport White Background</option>
<option value="blue">Passport Blue Background</option>
<option value="lightgray">Professional Grey</option>
<option value="red">Visa Red Background</option>
<option value="green">Nature Green</option>
<option value="transparent">Transparent</option>
</select>

<br><br>

<button id="processBtn">Generate Preview</button>

<br><br>

<h3>Preview</h3>

<canvas id="canvas"></canvas>

<br>

<button onclick="downloadImage('png')">Download PNG</button>
<button onclick="downloadImage('jpeg')">Download JPEG</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/dist/bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
