<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Free Passport Photo Maker</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f6fb;
text-align:center;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

h1{
margin-bottom:20px;
}

.upload{
margin-bottom:25px;
}

.bg-options{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
margin-bottom:25px;
}

.bg-option{
padding:12px 18px;
border-radius:8px;
border:1px solid #ddd;
cursor:pointer;
background:white;
}

.bg-option.active{
border:2px solid #4f46e5;
}

button{
padding:14px 25px;
border:none;
border-radius:8px;
background:#4f46e5;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

canvas{
margin-top:25px;
border:1px solid #ddd;
}

#downloadBtn{
margin-top:20px;
display:none;
background:#16a34a;
}

</style>

</head>

<body>

<div class="container">

<h1>Free Passport Photo Maker</h1>

<div class="upload">
<input type="file" id="upload" accept="image/*">
</div>

<h3>Select Background</h3>

<div class="bg-options">

<button class="bg-option active" data-color="#ffffff">White</button>
<button class="bg-option" data-color="#1e3a8a">Blue</button>
<button class="bg-option" data-color="#7f1d1d">Red</button>
<button class="bg-option" data-color="#065f46">Green</button>
<button class="bg-option" data-color="#4b5563">Grey</button>

</div>

<button id="generateBtn">Generate Passport Photo</button>

<br>

<canvas id="resultCanvas"></canvas>

<br>

<button id="downloadBtn">Download Photo</button>

</div>

<!-- Background Removal Library -->
<script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal/dist/bundle.min.js"></script>

<!-- Your Script -->
<script src="script.js"></script>

</body>
</html>
