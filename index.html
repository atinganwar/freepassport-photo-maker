<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Free Passport Photo Maker</title>

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.container {
  max-width: 750px;
  width: 100%;
  background: white;
  padding: 50px;
  border-radius: 15px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  animation: slideIn 0.5s ease-out;
}

@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

h1 {
  color: #2d3748;
  margin-bottom: 10px;
  font-size: 32px;
  text-align: center;
}

.subtitle {
  color: #718096;
  text-align: center;
  margin-bottom: 35px;
  font-size: 14px;
}

.section-title {
  color: #2d3748;
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 15px;
  display: block;
}

.upload {
  margin-bottom: 30px;
}

.upload input[type="file"] {
  display: block;
  width: 100%;
  padding: 15px;
  border: 2px dashed #cbd5e0;
  border-radius: 8px;
  background: #f7fafc;
  cursor: pointer;
  color: #4a5568;
  font-size: 14px;
  transition: all 0.3s ease;
}

.upload input[type="file"]:hover {
  border-color: #667eea;
  background: #edf2f7;
}

.bg-options {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 30px;
}

.bg-option {
  padding: 12px 20px;
  border-radius: 8px;
  border: 2px solid #e2e8f0;
  cursor: pointer;
  background: white;
  font-size: 13px;
  font-weight: 500;
  color: #4a5568;
  transition: all 0.3s ease;
}

.bg-option:hover {
  border-color: #667eea;
  box-shadow: 0 4px 12px rgba(102, 126, 234, 0.1);
}

.bg-option.active {
  border-color: #667eea;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
}

.button-group {
  display: flex;
  gap: 12px;
  margin-bottom: 30px;
}

button {
  flex: 1;
  padding: 14px 25px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(102, 126, 234, 0.2);
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(102, 126, 234, 0.3);
}

button:active {
  transform: translateY(0);
}

#downloadBtn {
  display: none;
  background: linear-gradient(135deg, #10b981 0%, #059669 100%);
  box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2);
}

#downloadBtn:hover {
  box-shadow: 0 6px 20px rgba(16, 185, 129, 0.3);
}

.canvas-container {
  margin: 30px 0;
  text-align: center;
}

canvas {
  max-width: 100%;
  height: auto;
  border: 2px solid #e2e8f0;
  border-radius: 8px;
  display: none;
}

canvas.active {
  display: block;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
}

@media (max-width: 600px) {
  .container {
    padding: 30px 20px;
  }
  
h1 {
    font-size: 24px;
  }
  
  .button-group {
    flex-direction: column;
  }
  
  button {
    width: 100%;
  }
}

</style>

</head>

<body>

<div class="container">

  <h1>🎫 Passport Photo Maker</h1>
  <p class="subtitle">Create professional passport photos in seconds</p>

  <div class="upload">
    <input type="file" id="upload" accept="image/*" placeholder="Click to upload your photo">
  </div>

  <label class="section-title">Select Background Color</label>

  <div class="bg-options">
    <button class="bg-option active" data-color="#ffffff">White</button>
    <button class="bg-option" data-color="#1e3a8a">Blue</button>
    <button class="bg-option" data-color="#7f1d1d">Red</button>
    <button class="bg-option" data-color="#065f46">Green</button>
    <button class="bg-option" data-color="#4b5563">Grey</button>
  </div>

  <div class="button-group">
    <button id="generateBtn">Generate Photo</button>
  </div>

  <div class="canvas-container">
    <canvas id="resultCanvas"></canvas>
  </div>

  <button id="downloadBtn">⬇️ Download Photo</button>

</div>

<!-- Background Removal Library -->
<script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal/dist/bundle.min.js"></script>

<!-- Your Script -->
<script src="script.js"></script>

</body>
</html>
